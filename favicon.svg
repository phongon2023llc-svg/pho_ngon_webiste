<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer circle border -->
  <circle cx="100" cy="100" r="95" fill="#fff" stroke="#000" stroke-width="3"/>

  <!-- Inner text circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Text path for "TAKE OUT & DINE IN" -->
  <defs>
    <path id="circlePath" d="M 100, 100 m -80, 0 a 80,80 0 1,1 160,0 a 80,80 0 1,1 -160,0"/>
  </defs>
  <text font-family="Arial, sans-serif" font-size="18" font-weight="bold" letter-spacing="2">
    <textPath href="#circlePath" startOffset="50%" text-anchor="middle">
      TAKE OUT &amp; DINE IN
    </textPath>
  </text>

  <!-- Bottom text "610.290.7085" -->
  <defs>
    <path id="bottomPath" d="M 100, 100 m -80, 0 a 80,80 0 0,0 160,0"/>
  </defs>
  <text font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    <textPath href="#bottomPath" startOffset="50%" text-anchor="middle">
      610.290.7085
    </textPath>
  </text>

  <!-- Central bowl with steam -->
  <ellipse cx="100" cy="110" rx="25" ry="20" fill="none" stroke="#d32f2f" stroke-width="3"/>
  <ellipse cx="100" cy="110" rx="20" ry="15" fill="none" stroke="#d32f2f" stroke-width="2"/>

  <!-- Steam lines -->
  <path d="M 90 90 Q 85 80 87 70" fill="none" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
  <path d="M 100 85 Q 100 75 100 65" fill="none" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
  <path d="M 110 90 Q 115 80 113 70" fill="none" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>

  <!-- Chopsticks -->
  <line x1="115" y1="95" x2="130" y2="75" stroke="#8b4513" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="97" x2="135" y2="77" stroke="#8b4513" stroke-width="2" stroke-linecap="round"/>
</svg>
